<h1>Rectangles</h1>

<p>The <tt>Rect</tt> constructor creates an SVGRectElement.</p>

<h2 cbc>Examples</h2><div>

<pre>new Rect( )</pre>

<p>Creates a rectangle at (0,0) with the default size of (200,50).</p>

<pre>new Rect( new Options( { center:true } ) )</pre>

<p>Creates a rectangle centered at (0,0) with the default size of (200,50).</p>
	
</div><!--h2--Examples-->
